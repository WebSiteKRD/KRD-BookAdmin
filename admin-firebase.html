<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="بەڕێوبەری کتێبخانەی سۆمای ناحوکومی - بەڕێوەبردنی کتێبەکانی سۆما و گۆڕینی زانیارییەکان">
    <meta name="keywords" content="کتێبخانەی سۆما, ناحوکومی, بەڕێوبەر, کتێب, سەما, بەڕێوەبردن, گۆڕینی, زانیاری, ئۆنڵاین">
    <meta name="author" content="کتێبخانەی سۆمای ناحوکومی">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەڕێوبەر - کتێبخانەی سۆمای ناحوکومی</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="login-section">
        <div class="login-container">
            <div class="login-card">
                <h1>چوونەژوورەوەی کتێبخانەی سۆمای ناحوکومی</h1>
                <p>تکایە وشەی نهێنی بنووسە بۆ چوونەژوورەوە</p>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">ناوی بەکارهێنەر:</label>
                        <input type="text" id="username" name="username" autocomplete="username" value="admin" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label for="password">وشەی نهێنی:</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="login-btn">چوونەژوورەوە</button>
                </form>
                
                <div id="loginError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard" style="display: none;">
        <!-- Navigation -->
        <nav class="admin-nav">
            <div class="nav-container">
                <div class="nav-logo">
                    <h2>بەڕێوبەری کتێبخانە</h2>
                </div>
                <div class="nav-actions">
                    <button id="logoutBtn" class="logout-btn">دەرچوون</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="container">
                <h1>داشبۆردی کتێبخانەی سۆمای ناحوکومی</h1>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>ژمارەی کتێبەکانی سۆما</h3>
                        <p id="totalBooks">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>دوایین زیادکراو</h3>
                        <p id="lastAdded">هیچ</p>
                    </div>
                </div>

                <!-- Add Book Form -->
                <div class="form-section">
                    <h2>زیادکردنی کتێبی سۆما</h2>
                    <form id="addBookForm" class="book-form">
                        <input type="hidden" id="editingBookId" name="editingBookId" value="">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="bookName">ناوی کتێب:</label>
                                <input type="text" id="bookName" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="bookAuthor">ناوی نوسەر:</label>
                                <input type="text" id="bookAuthor" name="author" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="bookType">جۆر:</label>
                                <select id="bookType" name="type" required>
                                    <option value="">هەڵبژێرە جۆرێک</option>
                                    <option value="مێژویی">مێژویی</option>
                                    <option value="ئەدەبی">ئەدەبی</option>
                                    <option value="هۆندراوە">هۆندراوە</option>
                                    <option value="ڕۆمانسی">ڕۆمانسی</option>
                                    <option value="ڕۆمان">ڕۆمان</option>
                                    <option value="چیڕۆک">چیڕۆک</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bookLink">لینکی کتێب:</label>
                                <input type="url" id="bookLink" name="link" placeholder="https://...">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="bookDesc">دەربارە:</label>
                            <textarea id="bookDesc" name="desc" rows="4" placeholder="وەسفی کتێب..."></textarea>
                        </div>
                        
                        <button type="submit" class="submit-btn">زیادکردنی کتێب</button>
                    </form>
                </div>

                <!-- Change Password Section -->
                <div class="form-section">
                    <h2>گۆڕینی وشەی نهێنی بەڕێوبەری سۆما</h2>
                    <form id="changePasswordForm" class="password-form">
                        <div class="form-group">
                            <label for="changeUsername">ناوی بەکارهێنەر:</label>
                            <input type="text" id="changeUsername" name="changeUsername" autocomplete="username" value="admin" style="display: none;">
                        </div>
                        <div class="form-group">
                            <label for="currentPassword">وشەی نهێنی ئێستا:</label>
                            <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">وشەی نهێنی نوێ:</label>
                            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required minlength="4">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">دووبارەکردنەوەی وشەی نهێنی نوێ:</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required minlength="4">
                        </div>
                        <button type="submit" class="submit-btn">گۆڕینی وشەی نهێنی</button>
                    </form>
                </div>

                <!-- Manage Books Section -->
                <div class="books-management">
                    <h2>بەڕێوەبردنی کتێبەکانی سۆما</h2>
                    <div class="books-list" id="booksList">
                        <!-- Books will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Success/Error Messages -->
    <div id="messageModal" class="message-modal" style="display: none;">
        <div class="message-content">
            <span class="close-message">&times;</span>
            <p id="messageText"></p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin-firebase.js"></script>
</body>
</html>
